{% extends 'etl_app/base.html' %}
{% block content %}
<h1>Catastro de Comunas</h1>

<table style="width: 100%; border-collapse: collapse; margin-top: 1.5rem; background: var(--bg-card);">
    <thead>
        <tr style="border-bottom: 2px solid var(--border);">
            <th style="padding: 1rem;">Nombre Comuna</th>
            <th style="padding: 1rem;">Región</th>
            <th style="padding: 1rem;">Habitantes</th>
        </tr>
    </thead>
    <tbody>
        {% for comuna in comunas %}
        <tr style="border-bottom: 1px solid var(--border);">
            <td style="padding: 1rem;">{{ comuna.nombre_normalizado|title }}</td>
            <td style="padding: 1rem;">{{ comuna.region }}</td>
            <td style="padding: 1rem;">{{ comuna.habitantes|default:"S/D" }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
