{% extends 'etl_app/base.html' %}
{% block content %}
<h1>Cargar Dataset: Famosos (DATOS2026-2.txt)</h1>
<div style="background: var(--bg-card); padding: 2rem; border-radius: 8px; border: 1px solid var(--border); max-width: 600px;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">{{ form.archivo.label }}</label>
            {{ form.archivo }}
            <p style="color: var(--text-muted); font-size: 0.85rem;">{{ form.archivo.help_text }}</p>
            {% if form.archivo.errors %}<div style="color: var(--danger)">{{ form.archivo.errors }}</div>{% endif %}
        </div>
        <div style="margin-bottom: 2rem; background: rgba(245, 158, 11, 0.05); padding: 1rem; border-radius: 6px; border: 1px solid rgba(245, 158, 11, 0.3)">
            <label style="display: flex; align-items: center; cursor: pointer; font-weight: 500;">
                {{ form.limpiar_antes }} <span style="margin-left: 0.5rem;">{{ form.limpiar_antes.label }}</span>
            </label>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin: 0.5rem 0 0 1.5rem;">{{ form.limpiar_antes.help_text }}</p>
        </div>
        <button type="submit" style="background: var(--primary); color: white; border: none; padding: 0.75rem 2rem; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem;">Ejecutar Pipeline ETL</button>
    </form>
</div>
{% endblock %}
